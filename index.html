<style>
:root{
  --bg:#EEF3F8;--surface:#FFFFFF;--surface2:#F0F5FB;--border:#D0DFF0;--border2:#B8CFEA;
  --text:#0A1929;--muted:#4A6580;--muted2:#7A9AB5;
  --blue:#005B9A;--blue-dim:#E3EEF8;--blue-light:#D0E6F5;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,91,154,0.1),0 1px 8px rgba(0,91,154,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:linear-gradient(160deg,#EEF3F8 60%,#D0E6F5);color:var(--text);font-family:'Roboto',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}

/* HEADER */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:56px;border-bottom:1.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;flex-shrink:0;box-shadow:0 1px 4px rgba(0,91,154,0.08)}
.tb-logo{display:flex;align-items:center;gap:8px}
.tb-logomark{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.tb-logomark img{width:100%;height:100%;object-fit:contain}
.tb-title{font-family:'Roboto Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:var(--text)}
.tb-title span{color:var(--blue)}
.tb-date{font-size:12px;color:var(--muted);font-weight:500}

/* MAIN */
.main{flex:1;max-width:720px;width:100%;margin:0 auto;padding:2rem 1.25rem}

/* HERO */
.hero{text-align:center;margin-bottom:2rem}
.hero img{height:72px;width:auto;object-fit:contain;margin-bottom:10px}
.hero-sub{font-size:13px;color:var(--muted);font-weight:500;letter-spacing:0.3px}

/* 6-TILE GRID */
.portal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}

/* DISPATCH TILE */
.tile{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center;position:relative;overflow:hidden;transition:all .18s;box-shadow:var(--shadow);text-decoration:none;color:var(--text);display:block}
.tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--blue))}
.tile.active:hover{border-color:var(--accent,var(--blue));transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,91,154,0.15);cursor:pointer}
.tile.active:active{transform:scale(0.97)}
.tile.dispatch{background:var(--blue);border-color:var(--blue);color:#fff}
.tile.dispatch::before{background:rgba(255,255,255,0.3)}
.tile.dispatch:hover{background:#00437A;border-color:#00437A;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,91,154,0.35)}
.tile-icon{font-size:28px;margin-bottom:8px}
.tile-title{font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;line-height:1.2}
.tile.dispatch .tile-title{color:#fff;font-size:14px}
.coming-soon{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;background:var(--blue-dim);color:var(--blue);padding:2px 8px;border-radius:20px;border:1px solid var(--border2);margin-top:6px}

/* FOOTER */
.footer{text-align:center;padding:1.25rem;font-size:12px;color:var(--muted2);border-top:1px solid var(--border);background:var(--surface)}

@media(max-width:480px){
  .portal-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:1.5rem 1rem}
}
</style>
</head>
